<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dialogue Archivist — Quick Web Export</title>
  <style>
    body{font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial; max-width: 900px; margin: 24px auto; padding: 0 16px}
    label{display:block; margin-top:12px; font-weight:600}
    input[type=text], textarea{width:100%; padding:8px; margin-top:6px; box-sizing:border-box}
    .participants{display:flex; gap:8px; align-items:center}
    .participant-field{flex:1}
    button{margin-top:10px; padding:8px 12px}
    .controls{display:flex; gap:8px; margin-top:12px}
    .preview{white-space:pre-wrap; background:#f8f9fb; padding:12px; border-radius:6px; margin-top:12px}
  </style>
</head>
<body>
  <h1>Dialogue Archivist — Quick Web Export</h1>
  <p>This static page builds a Logseq-friendly export in the browser. No server, no data leaves your device.</p>

  <label>Participants (start with two)</label>
  <div id="participants">
    <div class="participants"><input class="participant-field" placeholder="Participant name" /><button onclick="removeParticipant(this)">-</button></div>
    <div class="participants"><input class="participant-field" placeholder="Participant name" /><button onclick="removeParticipant(this)">-</button></div>
  </div>
  <button id="addParticipant">+ Add participant</button>

  <label>Header (optional)</label>
  <input id="header" type="text" placeholder="Short header or title for Logseq" />

  <label>Footer / Conclusion (optional)</label>
  <input id="footer" type="text" placeholder="Optional conclusion or action items summary" />

  <label>Paste raw dialogue here</label>
  <textarea id="raw" rows="14" placeholder="Paste flattened ChatGPT thread or export here..."></textarea>

  <div class="controls">
    <button id="generate">Generate Logseq Export</button>
    <button id="download" style="display:none">Download .md</button>
  </div>

  <h3>Preview</h3>
  <div id="preview" class="preview">No preview yet.</div>

<script>
function removeParticipant(btn){
  const p = btn.parentElement;
  p.remove();
}

document.getElementById('addParticipant').addEventListener('click', ()=>{
  const wrap = document.createElement('div');
  wrap.className='participants';
  wrap.innerHTML = '<input class="participant-field" placeholder="Participant name" /> <button onclick="removeParticipant(this)">-</button>';
  document.getElementById('participants').appendChild(wrap);
});

function getParticipants(){
  return Array.from(document.querySelectorAll('#participants .participant-field')).map(i=>i.value.trim()).filter(Boolean);
}

function guessBlocks(text){
  return text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split(/\n{2,}/).map(s=>s.trim()).filter(Boolean);
}

function detectLabel(block){
  const first = block.split('\n')[0].trim();
  const m = first.match(/^\s*([A-Z][A-Za-z0-9 _\-]{1,40})(?:\s*(?:said|writes|:|—|–)\s*)/i);
  if(m) return m[1].trim();
  const m2 = first.match(/^\s*\**([A-Z][A-Za-z0-9 _\-]{1,40})\**\s*[:\-]\s*/i);
  if(m2) return m2[1].trim();
  return null;
}

function stripLabel(block,label){
  const p = new RegExp('^\\s*\\*\\*?'+label.replace(/[-\\\/\^$*+?.()|[\]{}]/g,'\\$&')+'\\*\\*?\\s*[:\\-\\s]*','i');
  return block.replace(p,'').trim();
}

function buildLogseq(title, participants, blocks, footer){
  const created = new Date().toISOString();
  const parts = participants.map(p=>`[[${p}]]`).join(' ');
  const header = [];
  header.push(`- title:: ${title||'Dialogue'}`);
  header.push(`  date:: ${created}`);
  if(parts) header.push(`  participants:: ${parts}`);
  header.push('  source:: chatgpt-thread');
  header.push('  thread_type:: situational');
  header.push('  ---\n');

  const lines = [header.join('\n')];
  let alt = 0;
  for(const b of blocks){
    const label = detectLabel(b);
    let speaker, text;
    if(label){ speaker = label; text = stripLabel(b,label);} else {
      speaker = participants.length ? participants[alt % participants.length] : 'Unknown';
      alt++;
      text = b;
    }
    const first = text.split('\n')[0];
    lines.push(`- **${speaker}** :: ${first}`);
    const rest = text.split('\n').slice(1).join('\n').trim();
    if(rest){
      rest.split('\n').forEach(r=>{ lines.push(`  - ${r}`); });
    }
    lines.push('');
  }
  lines.push('## Conclusion');
  if(footer){
    lines.push(footer);
  } else {
    const participantsList = Array.from(new Set(blocks.map(b=>{
      const l=detectLabel(b); return l?l:null;
    })).filter(Boolean));
    lines.push(`- Summary: Participants ${participantsList.join(', ') || participants.join(', ')}`);
    lines.push('- Action items:');
    lines.push('  - Verify ambiguous turns');
    lines.push('  - Confirm participant canonical names');
  }
  return lines.join('\n');
}

document.getElementById('generate').addEventListener('click', ()=>{
  const participants = getParticipants();
  const raw = document.getElementById('raw').value;
  const header = document.getElementById('header').value;
  const footer = document.getElementById('footer').value;
  const blocks = guessBlocks(raw);
  const out = buildLogseq(header, participants, blocks, footer);
  document.getElementById('preview').textContent = out;
  const dl = document.getElementById('download');
  dl.style.display='inline-block';
  dl.onclick = ()=>{
    const blob = new Blob([out], {type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (header||'dialogue') + '.md';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };
});
</script>
</body>
</html>
